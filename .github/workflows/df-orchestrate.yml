name: DarkFactory Orchestrate

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_run:
    workflows:
      - DarkFactory Plan
      - DarkFactory Follow Through
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  orchestrate:
    name: Dispatch ready work
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.repository == 'marius-patrik/agent-darkfactory' &&
        (
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'workflow_run'
        )
      }}
    permissions:
      actions: write
      contents: read
      pull-requests: read

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "marius-patrik" ]]; then
            echo "::error::DarkFactory orchestrator can only run in the marius-patrik owner."
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" != "refs/heads/main" ]]; then
            echo "::error::DarkFactory orchestrator can only run from refs/heads/main."
            exit 1
          fi

      - name: Checkout DarkFactory from this repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: darkfactory-control
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: read

      - name: Run orchestrator
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          DF_CONTROL_REPO: marius-patrik/agent-darkfactory
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
          DF_MAX_GLOBAL_WORKERS: ${{ vars.DF_MAX_GLOBAL_WORKERS || '4' }}
          DF_MAX_REPO_WORKERS: ${{ vars.DF_MAX_REPO_WORKERS || '1' }}
          DF_MAX_STREAM_WORKERS: ${{ vars.DF_MAX_STREAM_WORKERS || '1' }}
        run: node darkfactory-control/.github/scripts/df-orchestrate.mjs
