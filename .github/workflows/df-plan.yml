name: DarkFactory Plan

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: Target repository in owner/name form. Defaults to this repository.
        required: false
        type: string
      ref:
        description: Optional target repository ref. Defaults to the target repository default branch.
        required: false
        type: string

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  df-plan:
    name: Reconcile PRD backlog
    runs-on: ubuntu-latest

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          # Privileged planning mints an installation token, so it only runs
          # from the canonical control repository's protected default branch.
          if [[ "${GITHUB_REPOSITORY}" != "marius-patrik/darkfactory-agent" ]]; then
            echo "::error::DarkFactory privileged planning can only run from marius-patrik/darkfactory-agent."
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" != "branch" || "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::DarkFactory privileged planning can only run from the main branch."
            exit 1
          fi

      - name: Checkout DarkFactory from this repository
        uses: actions/checkout@v4
        with:
          # Pin control scripts to the exact trusted event commit before any
          # installation token is minted.
          ref: ${{ github.sha }}
          path: darkfactory-control
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik

      - name: Run planner
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          DF_CONTROL_REPO: ${{ github.repository }}
          DF_TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.repo || github.repository }}
          DF_TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
          DF_PLAN_ALL: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        run: node darkfactory-control/.github/scripts/df-plan.mjs
